# OpenScientist plugin — release.yml
# ─────────────────────────────────────────────────────────────────────────────
# Drop this file at  .github/workflows/release.yml  in your plugin repo,
# verbatim. Tag a release (`git tag v0.1.0 && git push --tags`) and this
# workflow will publish an OCI artifact to ghcr.io under your namespace,
# signed with Sigstore keyless (no PATs, no GPG keys).
#
# The artifact is content-addressed (sha256). The signature is tied to the
# OIDC identity of THIS workflow file's path — so a malicious fork's release
# of the same name cannot impersonate you. Cosign verification on the install
# side enforces this pinning.
#
# Customize only PLUGIN_FILES below if your layout differs.

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read    # checkout
  packages: write   # push to ghcr.io
  id-token: write   # Sigstore keyless OIDC (DO NOT REMOVE — without this, signing fails)

env:
  REGISTRY:        ghcr.io
  ARTIFACT_TYPE:   application/vnd.openscientist.plugin.v1+json
  LAYER_TYPE:      application/vnd.openscientist.plugin.layer.v1.tar+gzip
  CONFIG_TYPE:     application/vnd.openscientist.plugin.config.v1+json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute names
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "version=$VERSION"                                   >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${REPO_LC}"               >> $GITHUB_OUTPUT
          echo "ref=${{ env.REGISTRY }}/${REPO_LC}:${VERSION}"      >> $GITHUB_OUTPUT
          echo "ref_latest=${{ env.REGISTRY }}/${REPO_LC}:latest"   >> $GITHUB_OUTPUT

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Pack plugin
        run: |
          set -euo pipefail
          # Customize PLUGIN_FILES if your layout differs. Default = top-level
          # manifest + standard surfaces + README + icon. Files that don't
          # exist are silently skipped by tar.
          # Top-level manifest + standard surfaces. `data/` is intentionally
          # excluded — it's per-install runtime state, never distributable.
          PLUGIN_FILES=(
            plugin.json
            README.md
            icon.png
            bin
            ui
            server
          )
          EXISTING=()
          for f in "${PLUGIN_FILES[@]}"; do
            if [ -e "$f" ]; then EXISTING+=("$f"); fi
          done
          test ${#EXISTING[@]} -gt 0 || { echo "::error::no plugin files found"; exit 1; }
          test -f plugin.json || { echo "::error::plugin.json is required"; exit 1; }
          tar czf plugin.tar.gz "${EXISTING[@]}"
          # Config blob: a minimal subset of plugin.json so registries that
          # display config can show useful metadata. OCI config blobs are
          # required by the distribution-spec.
          jq '{ id, version, displayName, description, engines, capabilities }' plugin.json > config.json
          ls -la plugin.tar.gz config.json
          sha256sum plugin.tar.gz config.json

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} \
             --username ${{ github.actor }} --password-stdin

      - name: Push artifact (versioned + :latest)
        run: |
          set -euo pipefail
          oras push "${{ steps.meta.outputs.ref }}" \
            --artifact-type "${{ env.ARTIFACT_TYPE }}" \
            --config "config.json:${{ env.CONFIG_TYPE }}" \
            "plugin.tar.gz:${{ env.LAYER_TYPE }}"
          oras tag "${{ steps.meta.outputs.ref }}" latest

      - name: Sign with Sigstore (keyless)
        run: |
          set -euo pipefail
          # cosign v2 defaults to keyless via OIDC when --identity-token is
          # auto-detected from GitHub Actions. No COSIGN_EXPERIMENTAL needed.
          # Sign both the versioned ref AND :latest so cosign verify works
          # against whichever the user requests.
          cosign sign --yes "${{ steps.meta.outputs.ref }}"
          cosign sign --yes "${{ steps.meta.outputs.ref_latest }}"

      - name: Verify (sanity)
        run: |
          set -euo pipefail
          cosign verify "${{ steps.meta.outputs.ref }}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.+@refs/.+" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          oras manifest fetch "${{ steps.meta.outputs.ref }}" | jq .

      - name: Summary
        run: |
          {
            echo "### Plugin published"
            echo ""
            echo "- **Ref:** \`${{ steps.meta.outputs.ref }}\`"
            echo "- **Latest:** \`${{ steps.meta.outputs.ref_latest }}\`"
            echo "- **Artifact type:** \`${{ env.ARTIFACT_TYPE }}\`"
            echo ""
            echo "Verify locally with:"
            echo ""
            echo "    cosign verify ${{ steps.meta.outputs.ref }} \\"
            echo "      --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/.+@refs/.+' \\"
            echo "      --certificate-oidc-issuer https://token.actions.githubusercontent.com"
          } >> $GITHUB_STEP_SUMMARY
